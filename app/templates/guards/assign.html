{% extends "base.html" %}
{% block title %}Asignar guardia{% endblock %}
{% block content %}
<h4><i class="bi bi-person-plus"></i> Asignar guardia</h4>
<p class="text-muted">
  Tramo: <strong>{{ slot.label }} ({{ slot.start }}–{{ slot.end }})</strong>
  — Grupo: <strong>{{ guard.group.name if guard.group else '—' }}</strong>
</p>

<div class="card">
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Profesor</label>
        <select name="teacher_id" class="form-select" required>
          {% if primary %}
          <optgroup label="— Profesores de guardia asignada —">
            {% for t in primary %}
            <option value="{{ t.id }}">{{ t.full_name }} — {{ t.points }} pts</option>
            {% endfor %}
          </optgroup>
          {% endif %}
          {% if secondary %}
          <optgroup label="— Libres en este tramo (sin clase) —">
            {% for t in secondary %}
            <option value="{{ t.id }}">{{ t.full_name }} — {{ t.points }} pts</option>
            {% endfor %}
          </optgroup>
          {% endif %}
          {% if not primary and not secondary %}
          <option disabled>No hay profesores disponibles</option>
          {% endif %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Minutos efectivos de guardia</label>
        <input type="number" name="effective_minutes" class="form-control" value="60" min="1" max="60" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Notas</label>
        <input type="text" name="notes" class="form-control" placeholder="Observaciones opcionales">
      </div>
      <button type="submit" class="btn btn-danger">Confirmar asignación</button>
      <a href="{{ url_for('guards.index') }}" class="btn btn-outline-secondary ms-2">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
