{% extends "base.html" %}
{% block title %}Aulas{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4><i class="bi bi-door-open"></i> Aulas</h4>
  <a href="{{ url_for('admin.room_create') }}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Nueva aula</a>
</div>
<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr><th>Nombre</th><th>Grupos asignados</th><th>Activa</th><th></th></tr>
      </thead>
      <tbody>
        {% for r in rooms %}
        <tr>
          <td>{{ r.name }}</td>
          <td><span class="text-muted small">{{ r.groups | length }}</span></td>
          <td><span class="badge bg-{{ 'success' if r.active else 'danger' }}">{{ 'Sí' if r.active else 'No' }}</span></td>
          <td class="d-flex gap-1">
            <a href="{{ url_for('admin.room_edit', rid=r.id) }}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
            <form method="POST" action="{{ url_for('admin.room_delete', rid=r.id) }}"
                  onsubmit="return confirm('¿Borrar el aula {{ r.name }}?')">
              <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
