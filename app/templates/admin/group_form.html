{% extends "base.html" %}
{% block title %}{{ 'Editar' if group else 'Nuevo' }} grupo{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0"><i class="bi bi-diagram-3"></i> {{ 'Editar' if group else 'Nuevo' }} grupo</h4>
  <a href="{{ back_url('admin.groups') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Atrás</a>
</div>
<div class="card">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-5">
          <label class="form-label">Nombre</label>
          <input type="text" name="name" class="form-control" value="{{ group.name if group else '' }}" placeholder="1ºA ESO" required>
        </div>
        <div class="col-md-2">
          <label class="form-label">Abreviatura</label>
          <input type="text" name="abbreviation" class="form-control" maxlength="20"
                 value="{{ group.abbreviation if group else '' }}" placeholder="1ESO_A">
        </div>
        <div class="col-md-3">
          <label class="form-label">Tipo de grupo</label>
          <select name="guard_type" class="form-select">
            <option value="">Grupo normal</option>
            <option value="guard" {% if group and group.guard_type == 'guard' %}selected{% endif %}>Guardia (pool primario)</option>
            <option value="guard_55" {% if group and group.guard_type == 'guard_55' %}selected{% endif %}>Guardia +55 (solo pool de libres, no se cubre)</option>
          </select>
        </div>
        <div class="col-md-4 d-flex align-items-center gap-3 pt-4">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" name="high_difficulty" id="hd" {% if group and group.high_difficulty %}checked{% endif %}>
            <label class="form-check-label" for="hd"><i class="bi bi-star-fill text-warning"></i> Alta dificultad</label>
          </div>
          {% if group %}
          <div class="form-check">
            <input type="checkbox" class="form-check-input" name="active" id="active" {% if group.active %}checked{% endif %}>
            <label class="form-check-label" for="active">Activo</label>
          </div>
          {% endif %}
        </div>
        <div class="col-md-4">
          <label class="form-label">
            Multiplicador de puntos
            {% if not points_enabled %}<small class="text-warning d-block">No se aplica — la puntuación está desactivada</small>{% endif %}
          </label>
          <input type="number" name="difficulty_multiplier" class="form-control" step="0.1" min="1" max="5" value="{{ group.difficulty_multiplier if group else '1.0' }}">
        </div>
      </div>
      <div class="mt-4">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{{ back_url('admin.groups') }}" class="btn btn-outline-secondary ms-2">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
